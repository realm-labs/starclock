name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  native:
    name: Native / ${{ matrix.profile }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: windows-x64-native
            runner: windows-2025
            host: x86_64-pc-windows-msvc
          - profile: linux-x64-native
            runner: ubuntu-24.04
            host: x86_64-unknown-linux-gnu
          - profile: macos-arm64-native
            runner: macos-15
            host: aarch64-apple-darwin
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    steps:
      - name: Check out the exact commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install pinned Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - name: Install pinned Rust components
        run: rustup toolchain install 1.97.0 --profile minimal --component clippy --component rustfmt
      - name: Install checksum-bound Sora
        run: node tools/sora/install.mjs
      - name: Run the repository gate natively
        run: node tools/repository-check/run.mjs
      - name: Execute Goal 02 schema and transport trace vectors natively
        run: cargo test -p starclock-agent-api --test schema_property_contract --test standard_session_loop --all-features && cargo test -p starclock-cli --test mcp_stdio --all-features && cargo test -p starclock-mcp --test http_conformance --all-features
      - name: Execute Goal 04 foundation contracts natively
        run: node tools/goal04/run-native-ci.mjs --foundation
      - name: Record native execution evidence
        run: node tools/ci/write-evidence.mjs --profile "${{ matrix.profile }}" --output ".ci-evidence/${{ matrix.profile }}.json"
      - name: Retain native evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-${{ matrix.profile }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: .ci-evidence/${{ matrix.profile }}.json
          if-no-files-found: error
          retention-days: 30

  compile-only:
    name: Compile only / ${{ matrix.profile }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: windows-arm64-compile
            runner: windows-2025
            host: x86_64-pc-windows-msvc
            target: aarch64-pc-windows-msvc
          - profile: linux-arm64-compile
            runner: ubuntu-24.04
            host: x86_64-unknown-linux-gnu
            target: aarch64-unknown-linux-gnu
          - profile: macos-x64-compile
            runner: macos-15
            host: aarch64-apple-darwin
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    steps:
      - name: Check out the exact commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install pinned Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - name: Install pinned Rust target
        run: |
          rustup toolchain install 1.97.0 --profile minimal
          rustup target add "${{ matrix.target }}" --toolchain 1.97.0
      - name: Install Linux ARM64 cross compiler
        if: matrix.profile == 'linux-arm64-compile'
        run: sudo apt-get update && sudo apt-get install --yes gcc-aarch64-linux-gnu
      - name: Check the alternate CPU target without execution
        run: cargo check --workspace --all-targets --all-features --target "${{ matrix.target }}"
      - name: Record compile-only evidence
        run: node tools/ci/write-evidence.mjs --profile "${{ matrix.profile }}" --output ".ci-evidence/${{ matrix.profile }}.json"
      - name: Retain compile-only evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-${{ matrix.profile }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: .ci-evidence/${{ matrix.profile }}.json
          if-no-files-found: error
          retention-days: 30
