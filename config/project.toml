package = "starclock_production_config"
includes = [
  "schema/common.toml",
  "schema/ability.toml",
  "schema/build-patch.toml",
  "schema/character.toml",
  "schema/equipment.toml",
  "schema/rule.toml",
  "schema/selector.toml",
  "schema/modifier.toml",
  "schema/expression.toml",
  "schema/effect.toml",
  "schema/operation.toml",
  "schema/enemy.toml",
  "schema/ai.toml",
  "schema/encounter.toml",
  "schema/activity.toml",
  "schema/standard.toml",
  "schema/universe.toml",
  "schema/universe-mechanics.toml",
  "schema/universe-run-content.toml",
]

[build]
default_source_format = "xlsx"
data_root = "data"
schema_lock = "generated/schema.lock"
excel_templates = "generated/templates"

[[build.codegen]]
target = "rust"
out = "generated/rust"
format = "never"

[[build.exports]]
format = "binary"
out = "generated/config.sora"

[[build.exports]]
format = "json-debug"
out = "generated/debug-json"

[codegen.rust]
runtime_format = "sora"
