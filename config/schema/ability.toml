[[enums]]
name = "AbilityKind"
values = ["Basic", "Skill", "Ultimate", "Talent", "Technique", "EnhancedBasic", "EnhancedSkill", "FollowUp", "Counter", "Summon", "Memosprite", "Passive", "Entry", "Countdown"]

[[enums]]
name = "TargetPattern"
values = ["SingleTarget", "Blast", "Aoe", "Bounce", "Support", "Enhance", "None", "ContentDefined"]

[[enums]]
name = "RetargetPolicy"
values = ["Locked", "CancelRemaining", "RetargetSameSide", "RecomputeEachHit"]

[[enums]]
name = "AbilityPhaseKind"
values = ["Entry", "BeforeHits", "Hits", "AfterHits", "Resolved"]

[[enums]]
name = "ResourceKind"
values = ["Energy", "SkillPoints", "Hp", "CharacterResource", "TeamResource"]

[[enums]]
name = "ResourceDeltaKind"
values = ["Spend", "Reserve", "Gain"]

[[enums]]
name = "ResourceTiming"
values = ["CommandAccepted", "ActionStarted", "PerHit", "AbilityResolved", "ActionFinished"]

[[enums]]
name = "HitTargetGroup"
values = ["Primary", "Adjacent", "Selected", "All", "BounceDraw", "SelfTarget"]

[[enums]]
name = "CritPolicy"
values = ["PerTarget", "Shared", "Never"]

[[tables]]
name = "Ability"
mode = "map"
key = "id"

[tables.source]
format = "xlsx"
file = "Ability.xlsx"

[[tables.fields]]
name = "id"
type = "ref<ContentIdentity.id>"

[[tables.fields]]
name = "kind"
type = "enum<AbilityKind>"

[[tables.fields]]
name = "target_pattern"
type = "enum<TargetPattern>"

[[tables.fields]]
name = "retarget_policy"
type = "enum<RetargetPolicy>"

[[tables.fields]]
name = "level_cap"
type = "i32"
range = [1, 30]

[[tables.fields]]
name = "cooldown_actions"
type = "i32"
range = [0, 100]

[[tables.fields]]
name = "semantic_tags_mask"
type = "i32"
range = [0, 2047]

[[tables.fields]]
name = "entry_rule_identity_id"
type = "optional<ref<ContentIdentity.id>>"

[[tables]]
name = "AbilityResourceDelta"
mode = "list"

[tables.source]
format = "xlsx"
file = "AbilityResourceDelta.xlsx"

[[tables.fields]]
name = "ability_id"
type = "ref<Ability.id>"

[[tables.fields]]
name = "sequence"
type = "i32"
range = [1, 100]

[[tables.fields]]
name = "resource_kind"
type = "enum<ResourceKind>"

[[tables.fields]]
name = "character_resource_key"
type = "optional<string>"

[[tables.fields]]
name = "delta_kind"
type = "enum<ResourceDeltaKind>"

[[tables.fields]]
name = "timing"
type = "enum<ResourceTiming>"

[[tables.fields]]
name = "amount_decimal"
type = "string"
length = [1, 32]

[[tables.indexes]]
name = "by_ability_sequence"
fields = ["ability_id", "sequence"]
unique = true

