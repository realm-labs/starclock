[[tables.fields]]
name = "sequence"
type = "i32"
range = [1, 100]

[[tables.fields]]
name = "rule_id"
type = "ref<RuleDefinition.id>"

[[tables.indexes]]
name = "by_effect_sequence"
fields = ["effect_id", "sequence"]
unique = true

[[tables.indexes]]
