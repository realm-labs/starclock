name = "EffectModifierBinding"
mode = "list"

[tables.source]
format = "xlsx"
file = "EffectModifierBinding.xlsx"

[[tables.fields]]
name = "effect_id"
type = "ref<Effect.id>"

[[tables.fields]]
name = "sequence"
type = "i32"
range = [1, 100]

[[tables.fields]]
name = "modifier_id"
type = "ref<ModifierDefinition.id>"

[[tables.indexes]]
name = "by_effect_sequence"
fields = ["effect_id", "sequence"]
unique = true

[[tables.indexes]]
name = "by_effect_modifier"
fields = ["effect_id", "modifier_id"]
unique = true

