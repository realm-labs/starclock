[[enums]]
name = "EffectCategory"
values = ["Buff", "Debuff", "Control", "Dot", "Mark", "Field", "Shield", "NeutralState"]

[[enums]]
name = "DispelCategory"
values = ["DispellableBuff", "DispellableDebuff", "CleanseableControl", "NonDispellable"]

[[enums]]
name = "EffectStackPolicy"
values = ["Replace", "Refresh", "RefreshAndAddStacks", "StrongestWins", "IndependentBySource", "IndependentInstances", "UniqueGlobal", "UniquePerSource"]

[[enums]]
name = "DurationClock"
values = ["Permanent", "OwnerTurnStart", "OwnerTurnEnd", "TargetTurnStart", "TargetTurnEnd", "ActionEnd", "WaveEnd", "BattleEnd"]

[[enums]]
name = "EffectTickPhase"
values = ["None", "TurnStart", "TurnEnd", "ActionStart", "ActionEnd", "AfterEvent"]

[[enums]]
name = "EffectTeardownPolicy"
values = ["RemoveWithOwner", "TransferToTeam", "FreezeSnapshot", "PersistByScope", "ExplicitRule"]

[[tables]]
name = "Effect"
mode = "map"
key = "id"

[tables.source]
format = "xlsx"
file = "Effect.xlsx"

[[tables.fields]]
name = "id"
type = "ref<ContentIdentity.id>"

[[tables.fields]]
name = "category"
type = "enum<EffectCategory>"

[[tables.fields]]
name = "dispel_category"
type = "enum<DispelCategory>"

[[tables.fields]]
name = "stack_limit"
type = "i32"
range = [1, 1000]

[[tables.fields]]
name = "duration_expression_id"
type = "optional<ref<ValueExpression.id>>"

[[tables.fields]]
name = "duration_clock"
type = "enum<DurationClock>"

[[tables.fields]]
name = "tick_phase"
type = "enum<EffectTickPhase>"

[[tables.fields]]
name = "stack_policy"
type = "enum<EffectStackPolicy>"

[[tables.fields]]
name = "magnitude_comparator_expression_id"
type = "optional<ref<ValueExpression.id>>"

[[tables.fields]]
name = "dot_element"
type = "optional<enum<CombatElement>>"

[[tables.fields]]
name = "detonation_tag_identity_id"
type = "optional<ref<ContentIdentity.id>>"

[[tables.fields]]
name = "snapshot_policy"
type = "enum<SnapshotPolicy>"

[[tables.fields]]
name = "teardown_policy"
type = "enum<EffectTeardownPolicy>"

[[tables.fields]]
name = "application_priority"
type = "i32"
range = [-1000000, 1000000]

[[tables]]
name = "EffectTag"
mode = "list"

[tables.source]
format = "xlsx"
file = "EffectTag.xlsx"

[[tables.fields]]
name = "effect_id"
type = "ref<Effect.id>"

[[tables.fields]]
name = "sequence"
type = "i32"
range = [1, 100]

[[tables.fields]]
name = "tag"
type = "string"
length = [1, 120]

[[tables.indexes]]
name = "by_effect_sequence"
fields = ["effect_id", "sequence"]
unique = true

[[tables.indexes]]
name = "by_effect_tag"
fields = ["effect_id", "tag"]
unique = true

