[[tables]]
name = "EffectGrantedAbility"
mode = "list"

[tables.source]
format = "xlsx"
file = "EffectGrantedAbility.xlsx"

[[tables.fields]]
name = "effect_id"
type = "ref<Effect.id>"

[[tables.fields]]
name = "sequence"
type = "i32"
range = [1, 100]

[[tables.fields]]
