[[enums]]
name = "LinkWavePersistence"
values = ["WaveOwned", "EncounterOwned", "Explicit"]

[[enums]]
name = "LinkedFormationPolicy"
values = ["NextAvailable", "FixedSlot", "NoFormationSlot"]

