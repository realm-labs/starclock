[[enums]]
name = "EnemyRank"
values = ["Normal", "Minion", "Elite", "Boss"]

[[enums]]
name = "ToughnessLayerKind"
values = ["Ordinary", "ExoToughness", "Sequential", "Shared"]

[[enums]]
name = "EnemyTelegraphKind"
values = ["None", "Charge", "LockOn", "PhaseSetup"]

[[enums]]
name = "EnemyPhaseTransitionModel"
values = ["TransformSameUnit", "ReplaceLinkedVariant", "ExplicitWave"]

[[enums]]
name = "PhaseCarryPolicy"
values = ["CarryExact", "CarryRatio", "Reset", "Clear", "ExplicitProgram"]

[[enums]]
name = "EnemyLinkKind"
values = ["Summon", "SharedHp", "Part", "Countdown", "TimelineActor"]

[[enums]]
name = "LinkOverflowPolicy"
values = ["Reject", "ReplaceOldest", "ReplaceNewest", "Skip"]

[[enums]]
name = "OwnerDefeatPolicy"
