format = "toml"
file = "TracePatch.toml"

[[tables.fields]]
name = "trace_id"
type = "ref<TraceNode.id>"

[[tables.fields]]
name = "sequence"
type = "i32"
range = [1, 100]

[[tables.fields]]
name = "patch"
type = "union<BuildPatch>"

[[tables.indexes]]
name = "by_trace_sequence"
fields = ["trace_id", "sequence"]
unique = true

