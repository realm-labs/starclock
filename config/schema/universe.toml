[[tables]]
name = "UniverseProfile"
mode = "map"
key = "id"
[tables.source]
format = "xlsx"
file = "Universe.xlsx"
sheet = "UniverseProfile"
[[tables.fields]]
name = "id"
type = "i32"
range = [1, 2147483647]
[[tables.fields]]
name = "stable_key"
type = "string"
length = [1, 160]
[[tables.fields]]
name = "game_version"
type = "string"
length = [1, 32]
[[tables.fields]]
name = "snapshot_date"
type = "string"
length = [10, 10]
[[tables.fields]]
name = "content_manifest_sha256"
type = "string"
length = [64, 64]
[[tables.fields]]
name = "pack_sha256"
type = "string"
length = [64, 64]
[[tables.fields]]
name = "world_count"
type = "i32"
range = [9, 9]
[[tables.fields]]
name = "path_count"
type = "i32"
range = [9, 9]
[[tables.fields]]
name = "runtime_loading"
type = "string"
length = [1, 80]
[[tables.indexes]]
name = "by_stable_key"
fields = ["stable_key"]
unique = true

