package = "starclock_standard_encounter_schema_fixture"
includes = [
  "../../schema/common.toml",
  "../../schema/ability.toml",
  "../../schema/build-patch.toml",
  "../../schema/character.toml",
  "../../schema/equipment.toml",
  "../../schema/rule.toml",
  "../../schema/selector.toml",
  "../../schema/modifier.toml",
  "../../schema/expression.toml",
  "../../schema/effect.toml",
  "../../schema/operation.toml",
  "../../schema/enemy.toml",
  "../../schema/ai.toml",
  "../../schema/encounter.toml",
  "../../schema/activity.toml",
  "../../schema/standard.toml",
]

[build]
data_root = "data"
schema_lock = "generated/schema.lock"

[[build.codegen]]
target = "rust"
out = "generated/rust"
format = "never"

[[build.exports]]
format = "binary"
out = "generated/config.sora"

[[build.exports]]
format = "json-debug"
out = "generated/debug-json"

[codegen.rust]
runtime_format = "sora"
